<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بيانات اتصال كلاب</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #d97706;
            --secondary: #b45309;
            --accent: #f59e0b;
            --light: #f8f9fa;
            --dark: #1e293b;
            --success: #10b981;
            --card-bg: rgba(255, 255, 255, 0.75);
            --card-border: rgba(255, 255, 255, 0.5);
            --dog-color: #d97706;
            --dog-paw: #b45309;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }
        
        body {
            background-color: #fffbeb;
            background-image: 
                radial-gradient(at 0% 0%, hsla(38,100%,74%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(22,100%,77%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(39,100%,70%,1) 0, transparent 50%);
            background-attachment: fixed;
            background-size: 200% 200%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--dark);
            overflow-x: hidden;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15), 0 0 0 1px var(--card-border) inset;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 2;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
        }
        
        .header {
            background: linear-gradient(135deg, rgba(217,119,6,0.9) 0%, rgba(180,83,9,0.9) 100%);
            color: white;
            padding: 40px 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        
        .header::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 60%);
            z-index: 1;
            pointer-events: none;
            animation: pulseLight 4s infinite alternate;
        }
        
        @keyframes pulseLight {
            0% { opacity: 0.5; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1.05); }
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 12px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            position: relative;
            z-index: 2;
        }
        
        .header p {
            font-size: 1.15rem;
            opacity: 0.95;
            max-width: 85%;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            font-weight: 500;
        }
        
        .content {
            padding: 40px 30px;
            position: relative;
        }
        
        .form-container, .data-container {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .form-container h2, .welcome-text {
            text-align: center;
            margin-bottom: 30px;
            color: var(--dark);
            font-weight: 800;
            font-size: 1.8rem;
            position: relative;
            padding-bottom: 15px;
        }
        
        .form-container h2::after, .welcome-text::after {
            content: "";
            position: absolute;
            bottom: 0;
            right: 50%;
            transform: translateX(50%);
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: 10px;
        }
        
        .form-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .input-group label {
            font-weight: 700;
            font-size: 1.05rem;
            color: #334155;
            padding-right: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-group input, .input-group textarea {
            padding: 16px 50px 16px 20px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 16px;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), inset 0 2px 4px rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            color: var(--dark);
        }
        
        .input-group input::placeholder, .input-group textarea::placeholder {
            color: #94a3b8;
        }
        
        .input-group input:focus, .input-group textarea:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.2), inset 0 2px 4px rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-2px);
        }
        
        .input-icon {
            position: absolute;
            top: 18px;
            left: 18px;
            color: var(--primary);
            font-size: 1.2rem;
            opacity: 0.8;
            transition: all 0.3s ease;
        }
        
        .input-group input:focus + .input-icon,
        .input-group textarea:focus + .input-icon {
            opacity: 1;
            transform: scale(1.1);
        }
        
        .input-group textarea {
            min-height: 120px;
            resize: vertical;
            padding-right: 20px;
            padding-left: 50px;
        }
        
        .input-group textarea + .input-icon {
            top: 18px;
            left: 18px;
            transform: none;
        }
        
        .btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 1.25rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 15px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(217, 119, 6, 0.4), 0 8px 10px -6px rgba(217, 119, 6, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            z-index: 1;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, var(--accent) 0%, var(--primary) 100%);
            z-index: -1;
            transition: opacity 0.4s ease;
            opacity: 0;
        }
        
        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(217, 119, 6, 0.5), 0 10px 10px -5px rgba(217, 119, 6, 0.3);
        }
        
        .btn:hover::before {
            opacity: 1;
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        
        .data-container {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            text-align: center;
        }
        
        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: -90px;
            border: 6px solid #fffbeb;
            box-shadow: 0 15px 35px rgba(217, 119, 6, 0.3);
            position: relative;
            z-index: 3;
            animation: floatAvatar 6s ease-in-out infinite;
        }
        
        @keyframes floatAvatar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .avatar i {
            font-size: 4rem;
            color: white;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }
        
        .user-info {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .info-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            text-align: right;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), inset 0 2px 4px rgba(255,255,255,0.5);
            border: 1px solid var(--card-border);
            border-right: 6px solid var(--primary);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .info-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.8);
        }
        
        .info-card h3 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
        }
        
        .info-card h3 i {
            font-size: 1.3rem;
            opacity: 0.9;
        }
        
        .info-card p {
            font-size: 1.7rem;
            font-weight: 800;
            color: var(--dark);
            direction: ltr;
            letter-spacing: 0.5px;
        }
        
        .notes-card p {
            font-size: 1.25rem;
            font-weight: 600;
            direction: rtl;
            text-align: right;
            white-space: pre-wrap;
            line-height: 1.7;
            color: #475569;
        }
        
        .footer {
            text-align: center;
            padding: 25px;
            color: #64748b;
            font-size: 1rem;
            font-weight: 600;
            border-top: 1px solid var(--card-border);
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
        }
        
        .floating-element {
            position: absolute;
            z-index: 1;
            opacity: 0.4;
            animation: float 20s infinite linear;
            filter: blur(2px);
        }
        
        .circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.4), rgba(217, 119, 6, 0.1));
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        
        .dog-paw {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(180, 83, 9, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            position: relative;
            animation: floatPaw 15s infinite ease-in-out;
        }
        
        @keyframes floatPaw {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            50% { transform: translateY(-30px) rotate(15deg) scale(1.1); }
        }
        
        .dog-paw::before,
        .dog-paw::after {
            content: "";
            position: absolute;
            background: radial-gradient(circle, rgba(180, 83, 9, 0.3) 0%, transparent 70%);
            border-radius: 50%;
        }
        
        .dog-paw::before {
            width: 50px;
            height: 50px;
            top: -20px;
            left: 25px;
        }
        
        .dog-paw::after {
            width: 50px;
            height: 50px;
            top: -20px;
            right: 25px;
        }
        
        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            33% { transform: translate(30px, -50px) rotate(120deg) scale(1.1); }
            66% { transform: translate(-20px, 20px) rotate(240deg) scale(0.9); }
            100% { transform: translate(0, 0) rotate(360deg) scale(1); }
        }
        
        .contact-instruction {
            text-align: center;
            margin-top: -15px;
            margin-bottom: 30px;
            color: #64748b;
            font-size: 1.15rem;
            padding: 0 20px;
            font-weight: 600;
        }
        
        .storage-info {
            background: rgba(245, 158, 11, 0.1);
            border-radius: 16px;
            padding: 15px;
            margin-top: 20px;
            text-align: center;
            font-size: 0.95rem;
            color: #b45309;
            border: 1px solid rgba(245, 158, 11, 0.3);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .loading {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            gap: 20px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(217, 119, 6, 0.1);
            border-radius: 50%;
            border-top: 4px solid var(--primary);
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Interactive Dog Styles */
        .interactive-dog {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 10;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }
        
        .interactive-dog:hover {
            transform: scale(1.05) translateY(-10px);
        }
        
        .dog-body {
            width: 160px;
            height: 110px;
            background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
            border-radius: 80px 80px 45px 45px;
            position: relative;
            animation: dogFloat 4s infinite cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.2), inset 5px 5px 15px rgba(255,255,255,0.2);
        }
        
        .dog-head {
            width: 100px;
            height: 90px;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            border-radius: 50%;
            position: absolute;
            top: -45px;
            left: 30px;
            box-shadow: inset -3px -3px 10px rgba(0,0,0,0.1), inset 3px 3px 10px rgba(255,255,255,0.3);
        }
        
        .dog-ear {
            position: absolute;
            width: 45px;
            height: 55px;
            background: #b45309;
            top: -35px;
            border-radius: 50% 50% 0 0;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.2);
        }
        
        .dog-ear.left {
            left: 15px;
            transform: rotate(-15deg);
            transform-origin: bottom right;
            animation: earFlickLeft 5s infinite;
        }
        
        .dog-ear.right {
            right: 15px;
            transform: rotate(15deg);
            transform-origin: bottom left;
            animation: earFlickRight 5s infinite 0.5s;
        }
        
        @keyframes earFlickLeft {
            0%, 90%, 100% { transform: rotate(-15deg); }
            95% { transform: rotate(-25deg); }
        }
        
        @keyframes earFlickRight {
            0%, 90%, 100% { transform: rotate(15deg); }
            95% { transform: rotate(25deg); }
        }
        
        .dog-eye {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #1e293b;
            border-radius: 50%;
            top: 30px;
        }
        
        .dog-eye::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            top: 4px;
            right: 4px;
        }
        
        .dog-eye.left { left: 25px; }
        .dog-eye.right { right: 25px; }
        
        .interactive-dog:hover .dog-eye {
            transform: scaleY(0.2);
        }
        
        .dog-nose {
            position: absolute;
            width: 24px;
            height: 16px;
            background: #1e293b;
            border-radius: 50%;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .dog-mouth {
            position: absolute;
            width: 45px;
            height: 22px;
            border-bottom: 3px solid #1e293b;
            border-radius: 0 0 50% 50%;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            transition: all 0.3s;
        }
        
        .interactive-dog:hover .dog-mouth {
            height: 30px;
            border-bottom: 4px solid #1e293b;
            background-color: #ef4444;
        }
        
        .dog-tail {
            position: absolute;
            width: 75px;
            height: 22px;
            background: linear-gradient(90deg, #b45309 0%, #d97706 100%);
            border-radius: 11px;
            right: -65px;
            top: 35px;
            transform-origin: left center;
            animation: tailWag 0.5s infinite alternate ease-in-out;
        }
        
        .dog-paw-btn {
            position: absolute;
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--primary) 100%);
            border-radius: 50%;
            top: -25px;
            right: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(217, 119, 6, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
            border: 3px solid #fffbeb;
        }
        
        .dog-paw-btn:hover {
            transform: scale(1.15) rotate(10deg);
            box-shadow: 0 12px 25px rgba(217, 119, 6, 0.5);
        }
        
        .dog-paw-btn i {
            font-size: 24px;
            color: #fff;
        }
        
        .claw {
            position: absolute;
            width: 6px;
            height: 18px;
            background: #fff;
            border-radius: 6px;
            bottom: -12px;
            transform-origin: top;
            opacity: 0;
            transition: all 0.2s;
        }
        
        .claw-1 { left: 12px; }
        .claw-2 { left: 24px; }
        .claw-3 { left: 37px; }
        
        .dog-paw-btn:hover .claw {
            animation: clawOut 0.4s forwards cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes clawOut {
            0% { transform: scaleY(0); opacity: 0; }
            100% { transform: scaleY(1); opacity: 1; }
        }
        
        @keyframes dogFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        @keyframes tailWag {
            0% { transform: rotate(-20deg); }
            100% { transform: rotate(20deg); }
        }
        
        .icon-claw {
            position: relative;
            display: inline-block;
            width: 28px;
            height: 28px;
            background: rgba(245, 158, 11, 0.1);
            border-radius: 8px;
        }
        
        .claw-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            color: var(--primary);
            z-index: 2;
        }
        
        .paw-button {
            position: relative;
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--primary) 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(217, 119, 6, 0.4);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 3px solid #fffbeb;
        }
        
        .paw-button:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 15px 35px rgba(217, 119, 6, 0.5);
        }
        
        .paw-button i {
            font-size: 26px;
            color: #fff;
        }
        
        .paw-button .claw {
            position: absolute;
            width: 6px;
            height: 22px;
            background: #fff;
            border-radius: 6px;
            bottom: -10px;
            transform-origin: top;
            opacity: 0;
        }
        
        .paw-button:hover .claw {
            animation: clawOut 0.4s forwards cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .paw-button .claw-1 { left: 14px; }
        .paw-button .claw-2 { left: 29px; }
        .paw-button .claw-3 { left: 45px; }
        
        .dog-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        
        .dog-face-element {
            position: absolute;
            font-size: 45px;
            opacity: 0.15;
            animation: float 25s infinite linear;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }
        
        @media (max-width: 480px) {
            .container { border-radius: 24px; }
            .header { padding: 30px 20px; }
            .header h1 { font-size: 2.1rem; }
            .header p { font-size: 1.05rem; }
            .content { padding: 30px 20px; }
            .avatar { width: 120px; height: 120px; margin-top: -70px; }
            .avatar i { font-size: 3.2rem; }
            .welcome-text { font-size: 1.6rem; }
            .info-card p { font-size: 1.5rem; }
            .interactive-dog { transform: scale(0.7); bottom: 10px; right: 10px; }
            .interactive-dog:hover { transform: scale(0.75) translateY(-10px); }
        }
    </style>
</head>
<body>
    <!-- عناصر عائمة للخلفية -->
    <div class="dog-elements">
        <div class="dog-face-element" style="top: 10%; left: 5%; animation-duration: 30s;">🐶</div>
        <div class="dog-face-element" style="top: 20%; left: 80%; animation-duration: 25s; animation-delay: -5s;">🐕</div>
        <div class="dog-face-element" style="top: 70%; left: 15%; animation-duration: 35s; animation-delay: -10s;">🐾</div>
        <div class="dog-face-element" style="top: 85%; left: 75%; animation-duration: 40s; animation-delay: -15s;">🦴</div>
    </div>
    
    <div class="floating-element circle" style="top: 10%; left: 5%; animation-duration: 20s;"></div>
    <div class="floating-element dog-paw" style="top: 70%; left: 80%; animation-duration: 25s; animation-delay: -5s;"></div>
    <div class="floating-element circle" style="top: 40%; left: 85%; width: 70px; height: 70px; animation-duration: 18s; animation-delay: -3s;"></div>
    
    <!-- الكلب التفاعلي -->
    <div class="interactive-dog">
        <div class="dog-body">
            <div class="dog-head">
                <div class="dog-ear left"></div>
                <div class="dog-ear right"></div>
                <div class="dog-eye left"></div>
                <div class="dog-eye right"></div>
                <div class="dog-nose"></div>
                <div class="dog-mouth"></div>
            </div>
            <div class="dog-tail"></div>
        </div>
        <div class="dog-paw-btn" id="refreshBtn">
            <i class="fas fa-redo"></i>
            <div class="claw claw-1"></div>
            <div class="claw claw-2"></div>
            <div class="claw claw-3"></div>
        </div>
    </div>
    
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-paw"></i> كلبوبي تاه <i class="fas fa-paw"></i></h1>
            <p> رجّعني بيتي انا تايه </p>
        </div>
        
        <div class="content">
            <!-- نموذج الإدخال للزيارة الأولى -->
            <div class="form-container" id="formContainer">
                <h2>بيانات التواصل </h2>
                <div class="input-group">
                    <label for="name">
                        <div class="icon-claw">
                            <i class="fas fa-user claw-icon"></i>
                        </div>
                        اسمك:
                    </label>
                    <div class="input-wrapper">
                        <input type="text" id="name" placeholder="أدخل اسمك هنا" required>
                        <div class="input-icon"><i class="fas fa-signature"></i></div>
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="phone">
                        <div class="icon-claw">
                            <i class="fas fa-mobile-alt claw-icon"></i>
                        </div>
                        رقم هاتفك:
                    </label>
                    <div class="input-wrapper">
                        <input type="tel" id="phone" placeholder="أدخل رقم هاتفك" required>
                        <div class="input-icon"><i class="fas fa-phone"></i></div>
                    </div>
                </div>
                
                <!-- خانة الملاحظات المضافة -->
                <div class="input-group">
                    <label for="notes">
                        <div class="icon-claw">
                            <i class="fas fa-sticky-note claw-icon"></i>
                        </div>
                        معلومات إضافية:
                    </label>
                    <div class="input-wrapper">
                        <textarea id="notes" placeholder="اكتب أي معلومات حابب تحفظها لحيوانك عشان متنسهاش"></textarea>
                        <div class="input-icon"><i class="fas fa-pen"></i></div>
                    </div>
                </div>
                
                <button class="btn" id="saveBtn">
                    <i class="fas fa-paw"></i> حفظ البيانات
                </button>
                
                <div class="storage-info">
                    سيتم حفظ بياناتك لتظهر عند زيارتك القادمة للموقع
                </div>
            </div>
            
            <!-- عرض البيانات للزيارات التالية -->
            <div class="data-container" id="dataContainer">
                <div class="avatar">
                    <i class="fas fa-dog"></i>
                </div>
                
                <h2 class="welcome-text">بيانات الاتصال</h2>
                
                <div class="user-info">
                    <div class="info-card">
                        <h3><i class="fas fa-user-tag"></i> اسمي:</h3>
                        <p id="displayName">محمد أحمد</p>
                    </div>
                    
                    <div class="info-card">
                        <h3><i class="fas fa-phone-alt"></i> رقم هاتفي:</h3>
                        <p id="displayPhone">+966 50 123 4567</p>
                    </div>
                    
                    <!-- بطاقة عرض الملاحظات المضافة -->
                    <div class="info-card notes-card">
                        <h3><i class="fas fa-sticky-note"></i> معلومات عن الكلب:</h3>
                        <p id="displayNotes">لا توجد معلومات إضافية</p>
                    </div>
                </div>
                
                <div class="paw-button" id="editBtn">
                    <i class="fas fa-edit"></i>
                    <div class="claw claw-1"></div>
                    <div class="claw claw-2"></div>
                    <div class="claw claw-3"></div>
                </div>
            </div>
            
            <!-- حالة التحميل -->
            <div class="loading" id="loading" style="display: none;">
                <div class="spinner"></div>
                <span style="margin-right: 10px;">جاري تحميل البيانات...</span>
            </div>
        </div>
        
        <div class="footer">
            <i class="fas fa-paw"></i> Designed By PickyPets <i class="fas fa-paw"></i>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            // Wait for Firebase to initialize
            while (!window.firestore) {
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            
            const { db, doc, getDoc, setDoc } = window.firestore;
            
            const formContainer = document.getElementById('formContainer');
            const dataContainer = document.getElementById('dataContainer');
            const loading = document.getElementById('loading');
            const displayName = document.getElementById('displayName');
            const displayPhone = document.getElementById('displayPhone');
            const displayNotes = document.getElementById('displayNotes');
            const nameInput = document.getElementById('name');
            const phoneInput = document.getElementById('phone');
            const notesInput = document.getElementById('notes');
            const saveBtn = document.getElementById('saveBtn');
            const refreshBtn = document.getElementById('refreshBtn');
            const editBtn = document.getElementById('editBtn');
            
            // Reference to Firestore document
            const docRef = doc(db, "catOwners", "userDog1");
            
            // Show loading state
            formContainer.style.display = 'none';
            dataContainer.style.display = 'none';
            loading.style.display = 'flex';
            
            try {
                // Try to get data from Firestore
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    // Data exists - show data container
                    const data = docSnap.data();
                    displayName.textContent = data.name || 'غير متوفر';
                    displayPhone.textContent = data.phone || 'غير متوفر';
                    
                    // عرض الملاحظات أو رسالة افتراضية إذا كانت فارغة
                    displayNotes.textContent = data.notes || 'لا توجد معلومات إضافية';
                    
                    dataContainer.style.display = 'flex';
                } else {
                    // No data - show form
                    formContainer.style.display = 'flex';
                }
            } catch (error) {
                // Error handling
                console.error("حدث خطأ في جلب البيانات:", error);
                
                // Show error message
                const errorMsg = document.createElement('div');
                errorMsg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> فشل في تحميل البيانات، الرجاء المحاولة لاحقًا';
                errorMsg.style.cssText = `
                    background: var(--accent);
                    color: white;
                    padding: 15px;
                    border-radius: 10px;
                    text-align: center;
                    margin: 20px;
                    font-weight: bold;
                `;
                document.querySelector('.content').appendChild(errorMsg);
                
                // Show form as fallback
                formContainer.style.display = 'flex';
            } finally {
                // Hide loading state
                loading.style.display = 'none';
            }
            
            // Save button event listener
            saveBtn.addEventListener('click', async function() {
                const name = nameInput.value;
                const phone = phoneInput.value;
                const notes = notesInput.value;
                
                if (!name || !phone) {
                    // Show error animation
                    const inputs = document.querySelectorAll('input');
                    inputs.forEach(input => {
                        if (!input.value) {
                            input.style.borderColor = 'var(--accent)';
                            input.style.animation = 'shake 0.5s';
                            
                            setTimeout(() => {
                                input.style.animation = '';
                            }, 500);
                        }
                    });
                    
                    // Create alert message
                    const alertMsg = document.createElement('div');
                    alertMsg.innerHTML = '<i class="fas fa-exclamation-circle"></i> الرجاء إدخال جميع البيانات المطلوبة';
                    alertMsg.style.cssText = `
                        position: fixed;
                        top: 20px;
                        right: 20px;
                        background: var(--accent);
                        color: white;
                        padding: 15px 25px;
                        border-radius: 10px;
                        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
                        z-index: 1000;
                        animation: slideIn 0.5s, fadeOut 0.5s 2.5s;
                    `;
                    
                    document.body.appendChild(alertMsg);
                    
                    setTimeout(() => {
                        alertMsg.remove();
                    }, 3000);
                    return;
                }
                
                try {
                    // Show saving state
                    const originalBtnText = saveBtn.innerHTML;
                    saveBtn.innerHTML = '<i class="fas fa-paw fa-spin"></i> جاري الحفظ...';
                    saveBtn.disabled = true;
                    
                    // Save to Firestore
                    await setDoc(docRef, {
                        name: name,
                        phone: phone,
                        notes: notes || 'لا توجد معلومات إضافية',
                        timestamp: new Date()
                    });
                    
                    // Show success animation
                    saveBtn.innerHTML = '<i class="fas fa-check"></i> تم الحفظ!';
                    saveBtn.style.background = 'linear-gradient(90deg, var(--success), #01c896)';
                    
                    setTimeout(() => {
                        // Reset button
                        saveBtn.innerHTML = originalBtnText;
                        saveBtn.style.background = 'linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%)';
                        saveBtn.disabled = false;
                        
                        // Show data container
                        formContainer.style.display = 'none';
                        dataContainer.style.display = 'flex';
                        displayName.textContent = name;
                        displayPhone.textContent = phone;
                        displayNotes.textContent = notes || 'لا توجد معلومات إضافية';
                    }, 1500);
                } catch (error) {
                    console.error("حدث خطأ في حفظ البيانات:", error);
                    
                    // Show error message
                    const alertMsg = document.createElement('div');
                    alertMsg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> فشل في حفظ البيانات، الرجاء المحاولة لاحقًا';
                    alertMsg.style.cssText = `
                        position: fixed;
                        top: 20px;
                        right: 20px;
                        background: var(--accent);
                        color: white;
                        padding: 15px 25px;
                        border-radius: 10px;
                        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
                        z-index: 1000;
                    `;
                    
                    document.body.appendChild(alertMsg);
                    
                    setTimeout(() => {
                        alertMsg.remove();
                    }, 3000);
                    
                    // Reset button
                    saveBtn.innerHTML = originalBtnText;
                    saveBtn.disabled = false;
                }
            });
            
            // Refresh button event listener
            refreshBtn.addEventListener('click', function() {
                location.reload();
            });
            
            // Edit button event listener
            editBtn.addEventListener('click', function() {
                dataContainer.style.display = 'none';
                formContainer.style.display = 'flex';
                nameInput.value = displayName.textContent;
                phoneInput.value = displayPhone.textContent;
                notesInput.value = displayNotes.textContent === 'لا توجد معلومات إضافية' ? '' : displayNotes.textContent;
            });
            
            // Add animation styles
            const style = document.createElement('style');
            style.innerHTML = `
                @keyframes shake {
                    0%, 100% { transform: translateX(0); }
                    20%, 60% { transform: translateX(-10px); }
                    40%, 80% { transform: translateX(10px); }
                }
                
                @keyframes slideIn {
                    from { transform: translateX(100px); opacity: 0; }
                    to { transform: translateX(0); opacity: 1; }
                }
                
                @keyframes fadeOut {
                    from { opacity: 1; transform: translateY(0); }
                    to { opacity: 0; transform: translateY(-20px); }
                }
                
                @keyframes fadeIn {
                    from { opacity: 0; transform: translateY(-20px); }
                    to { opacity: 1; transform: translateY(0); }
                }
            `;
            document.head.appendChild(style);
        });
    </script>
</body>
</html>
